services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-chat_app}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./tables.sql:/docker-entrypoint-initdb.d/01_tables.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-chat_app}" ]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    environment:
      DB_NAME: ${DB_NAME:-chat_app}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      API: http://host.docker.internal:11434/api/chat
      MODEL: ${MODEL:-phi3}
      SYSTEM_PROMPT: ${SYSTEM_PROMPT:-If greeting → reply with greeting. Otherwise short answer.}
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  postgres_data:
